name: Check Rio (BA/ROS/COR→GIG)

on:
  schedule:
    # Cada 12h: 03:00 y 15:00 UTC (00:00 y 12:00 Argentina)
    - cron: '0 3,15 * * *'

  workflow_dispatch:

jobs:
  check-rio:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore alert state (rio)
        uses: actions/cache@v4
        with:
          path: data/alert_state.json
          key: alert-state-rio
          restore-keys: alert-state-rio

      - name: Run price checker (zona rio)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Credenciales de Amadeus (opcionales: sin ellas la fuente se saltea)
          AMADEUS_CLIENT_ID: ${{ secrets.AMADEUS_CLIENT_ID }}
          AMADEUS_CLIENT_SECRET: ${{ secrets.AMADEUS_CLIENT_SECRET }}
          AMADEUS_ENV: ${{ vars.AMADEUS_ENV }}
        run: timeout 3600 python -m src.main --config config/routes-rio.json

      - name: Commit alert history for dashboard
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/alerts.json 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "chore: update alert history [skip ci]" && git pull --rebase origin main && git push)

      - name: Save alert state (rio)
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/alert_state.json
          key: alert-state-rio-${{ github.run_id }}
